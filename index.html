<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertech TdF | AgroTech + Data Centers desde el extremo sur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ── */
,::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B2A;
  --teal:#0E7C7B;
  --teal-lt:#14A8A6;
  --amber:#F59E0B;
  --green:#10B981;
  --white:#FFFFFF;
  --off:#F4F8F8;
  --gray:#64748B;
  --gray-lt:#CBD5E1;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --r:1rem;
  --transition:0.35s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--navy);color:var(--white);overflow-x:hidden;line-height:1.65}

/* ── HERO LAYOUT ── */
.hero-logo-center{
  display:flex;justify-content:center;align-items:center;
  padding:2rem 0 2.5rem;
  width:100%;
}
.hero-logo-center img{
  width:min(340px,72%);height:auto;
  filter:drop-shadow(0 6px 40px rgba(245,158,11,.35));
  animation:floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.hero-content{
  width:100%;max-width:720px;margin:0 auto;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.hero-content .hero-sub{text-align:center;max-width:520px}
.hero-content .cta-row{justify-content:center}
.hero-content .kpi-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;
  width:100%;max-width:760px;margin-top:2.5rem;
}
@media(max-width:760px){
  .hero-content .kpi-grid{grid-template-columns:1fr 1fr}
}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2.5rem;
  background:rgba(13,27,42,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(14,124,123,0.2);
  transition:var(--transition);
}
.logo{font-family:var(--serif);font-size:1.4rem;color:var(--white);letter-spacing:.03em}
.logo span{color:var(--teal)}
nav a{
  color:var(--gray-lt);font-size:.85rem;font-weight:500;
  text-decoration:none;margin-left:1.8rem;letter-spacing:.04em;
  transition:color var(--transition);
}
nav a:hover{color:var(--teal-lt)}

/* ── HERO ── */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8rem 2.5rem 5rem;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(14,124,123,.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 10% 80%, rgba(245,158,11,.08) 0%, transparent 60%),
    var(--navy);
  position:relative;overflow:hidden;
  text-align:center;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230E7C7B' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
}
.hero-inner{display:none}
.hero-tag{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(14,124,123,.15);border:1px solid rgba(14,124,123,.4);
  color:var(--teal-lt);padding:.35rem .9rem;border-radius:2rem;
  font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:1.5rem;
}
h1{
  font-family:var(--serif);font-size:clamp(2.6rem,5vw,4rem);line-height:1.15;
  margin-bottom:1.25rem;
}
h1 em{color:var(--teal-lt);font-style:italic}
.hero-sub{color:var(--gray-lt);font-size:1.1rem;font-weight:300;max-width:460px;margin-bottom:2.5rem}
.cta-row{display:flex;gap:1rem;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.8rem 1.8rem;border-radius:.5rem;font-size:.9rem;font-weight:600;
  text-decoration:none;transition:var(--transition);cursor:pointer;border:none;
}
.btn-primary{background:var(--teal);color:var(--white)}
.btn-primary:hover{background:var(--teal-lt);transform:translateY(-2px);box-shadow:0 8px 24px rgba(14,124,123,.35)}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.25)}
.btn-ghost:hover{border-color:var(--teal-lt);color:var(--teal-lt)}

/* KPI grid hero */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.kpi-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(14,124,123,.25);
  border-radius:.75rem;padding:1.5rem;
  backdrop-filter:blur(6px);
  transition:var(--transition);
}
.kpi-card:hover{border-color:var(--teal);transform:translateY(-3px)}
.kpi-val{font-family:var(--serif);font-size:2rem;color:var(--amber);display:block;margin-bottom:.25rem}
.kpi-lbl{font-size:.78rem;color:var(--gray-lt);font-weight:400;letter-spacing:.04em}

/* ── SECTION BASE ── */
section{padding:6rem 2.5rem}
.container{max-width:1200px;margin:0 auto}
.section-tag{
  font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--teal-lt);margin-bottom:.75rem;display:block;
}
h2{font-family:var(--serif);font-size:clamp(2rem,3.5vw,2.8rem);line-height:1.2;margin-bottom:1rem}
.section-sub{color:var(--gray-lt);font-size:1rem;font-weight:300;max-width:560px;margin-bottom:3rem}

/* ── PROBLEMA ── */
.problema{background:var(--off);color:var(--navy)}
.problema h2,.problema .section-tag{color:var(--navy)}
.problema .section-tag{color:var(--teal)}
.problema .section-sub{color:var(--gray)}
.cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.prob-card{
  background:var(--white);border-radius:1rem;padding:2rem;
  border-top:4px solid transparent;
  box-shadow:0 2px 16px rgba(0,0,0,.06);
  transition:var(--transition);
}
.prob-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.1)}
.prob-card:nth-child(1){border-top-color:#0D7CC7}
.prob-card:nth-child(2){border-top-color:var(--amber)}
.prob-card:nth-child(3){border-top-color:var(--green)}
.prob-icon{font-size:2rem;margin-bottom:1rem;display:block}
.prob-card h3{font-family:var(--serif);font-size:1.25rem;color:var(--navy);margin-bottom:.75rem}
.prob-card p{font-size:.9rem;color:var(--gray);line-height:1.7}

/* ── PROPUESTA ── */
.propuesta{background:var(--navy)}
.pilares{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;margin-top:3rem}
.pilar{
  display:grid;grid-template-columns:auto 1fr;gap:1rem;
  background:rgba(255,255,255,.04);border:1px solid rgba(14,124,123,.2);
  border-radius:.875rem;padding:1.5rem;
  transition:var(--transition);
}
.pilar:hover{border-color:var(--teal);background:rgba(14,124,123,.08)}
.pilar-icon{
  width:44px;height:44px;border-radius:.5rem;
  background:rgba(14,124,123,.2);display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.pilar h3{font-size:1rem;font-weight:600;margin-bottom:.4rem;color:var(--white)}
.pilar p{font-size:.85rem;color:var(--gray-lt);line-height:1.65}

/* ── CKD TABLA ── */
.ckd{background:linear-gradient(135deg,#0a1520 0%,#0D1B2A 100%)}
.table-wrap{overflow-x:auto;margin-top:2.5rem}
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead th{
  background:var(--teal);color:var(--white);
  padding:.85rem 1.1rem;text-align:left;font-weight:600;font-size:.8rem;letter-spacing:.06em
}
thead th:first-child{border-radius:.5rem 0 0 0}
thead th:last-child{border-radius:0 .5rem 0 0}
tbody tr{border-bottom:1px solid rgba(255,255,255,.06);transition:background var(--transition)}
tbody tr:hover{background:rgba(14,124,123,.08)}
tbody td{padding:.8rem 1.1rem;color:var(--gray-lt)}
tbody td:first-child{color:var(--white);font-weight:500}
tbody td:last-child{color:var(--teal-lt)}
.ckd-note{
  margin-top:1.5rem;padding:1rem 1.5rem;
  background:rgba(14,124,123,.12);border-left:3px solid var(--teal);
  border-radius:0 .5rem .5rem 0;font-size:.88rem;color:var(--teal-lt);font-weight:500;
}

/* ── BRASIL ── */
.brasil{background:var(--off);color:var(--navy)}
.brasil h2,.brasil .section-tag{color:var(--navy)}
.brasil .section-tag{color:#1a7a3c}
.brasil .section-sub{color:var(--gray)}
.brasil-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.stat-row{display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
.stat-box{
  flex:1;min-width:130px;background:var(--navy);color:var(--white);
  border-radius:.75rem;padding:1.25rem;text-align:center;
}
.stat-box .val{font-family:var(--serif);font-size:1.7rem;color:var(--amber);display:block}
.stat-box .lbl{font-size:.75rem;color:var(--gray-lt);margin-top:.25rem}
.brasil-pts{display:flex;flex-direction:column;gap:1.25rem}
.brasil-pt{padding-left:1.25rem;border-left:3px solid #1a7a3c}
.brasil-pt h4{font-size:.95rem;font-weight:600;color:var(--navy);margin-bottom:.35rem}
.brasil-pt p{font-size:.85rem;color:var(--gray);line-height:1.65}

/* ── PROVEEDORES ── */
.proveedores{background:var(--navy)}
.sup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.sup-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:1rem;overflow:hidden;transition:var(--transition);
}
.sup-card:hover{border-color:var(--teal);transform:translateY(-3px)}
.sup-badge{
  padding:.6rem 1.25rem;font-size:.75rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;text-align:center;
}
.badge-green{background:var(--green);color:var(--navy)}
.badge-teal{background:var(--teal);color:var(--white)}
.badge-amber{background:var(--amber);color:var(--navy)}
.sup-body{padding:1.5rem}
.sup-body h3{font-family:var(--serif);font-size:1.15rem;margin-bottom:1rem;color:var(--white)}
.sup-body ul{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.sup-body li{font-size:.83rem;color:var(--gray-lt);padding-left:1rem;position:relative}
.sup-body li::before{content:'›';position:absolute;left:0;color:var(--teal-lt);font-weight:700}

/* ── FINANCIERO ── */
.financiero{background:var(--off);color:var(--navy)}
.financiero h2{color:var(--navy)}
.financiero .section-tag{color:var(--teal)}
.financiero .section-sub{color:var(--gray)}
.kpi-row{display:flex;gap:1rem;margin-bottom:3rem;flex-wrap:wrap}
.fin-kpi{
  flex:1;min-width:160px;border-radius:.75rem;padding:1.5rem;text-align:center;
}
.fin-kpi.navy{background:var(--navy);color:var(--white)}
.fin-kpi.teal{background:var(--teal);color:var(--white)}
.fin-kpi.green{background:var(--green);color:var(--navy)}
.fin-kpi.amber{background:var(--amber);color:var(--navy)}
.fin-kpi .fv{font-family:var(--serif);font-size:2rem;display:block;margin-bottom:.3rem}
.fin-kpi .fl{font-size:.8rem;font-weight:500;opacity:.85}
.revenue-table{width:100%;border-collapse:collapse;margin-bottom:2rem}
.revenue-table thead th{background:var(--navy);color:var(--white);padding:.8rem 1rem;text-align:left;font-size:.8rem;font-weight:600;letter-spacing:.05em}
.revenue-table tbody tr{border-bottom:1px solid var(--gray-lt)}
.revenue-table tbody td{padding:.85rem 1rem;font-size:.88rem;color:var(--navy)}
.revenue-table tbody tr:last-child{border-bottom:2px solid var(--navy);font-weight:700;background:rgba(14,124,123,.07)}

/* ── ROADMAP ── */
.roadmap{background:var(--navy)}
.phases{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2.5rem}
.phase{
  background:rgba(255,255,255,.04);border:1px solid rgba(14,124,123,.2);
  border-radius:.875rem;overflow:hidden;
  transition:var(--transition);
}
.phase:hover{border-color:var(--teal)}
.phase-head{
  background:var(--teal);padding:.9rem 1rem;
  font-size:.85rem;font-weight:700;color:var(--white);text-align:center;letter-spacing:.03em;
}
.phase-body{padding:1.25rem}
.phase-body h4{font-size:.9rem;font-weight:600;color:var(--white);margin-bottom:.85rem}
.phase-body ul{list-style:none;display:flex;flex-direction:column;gap:.55rem;margin-bottom:1rem}
.phase-body li{font-size:.8rem;color:var(--gray-lt);padding-left:.85rem;position:relative;line-height:1.5}
.phase-body li::before{content:'·';position:absolute;left:0;color:var(--teal-lt);font-size:1.2rem;line-height:.9}
.phase-budget{
  background:var(--amber);color:var(--navy);
  border-radius:.35rem;padding:.4rem .75rem;
  font-size:.8rem;font-weight:700;text-align:center;display:block;
}

/* ── ECOSISTEMA ── */
.ecosistema{background:var(--off);color:var(--navy)}
.ecosistema h2{color:var(--navy)}
.ecosistema .section-tag{color:var(--teal)}
.ecosistema .section-sub{color:var(--gray)}
.mirgor-box{
  background:linear-gradient(135deg,#e8f4fd,#f0f9f9);
  border:1px solid #0D7CC7;border-radius:1rem;
  padding:1.5rem 2rem;margin-bottom:2.5rem;
}
.mirgor-box h3{font-family:var(--serif);font-size:1.1rem;color:var(--navy);margin-bottom:.5rem}
.mirgor-box p{font-size:.88rem;color:var(--gray);line-height:1.7}
.helice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.helice-card{
  background:var(--white);border-radius:1rem;padding:1.75rem;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  border-top:4px solid transparent;
  transition:var(--transition);
}
.helice-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.1)}
.helice-card:nth-child(1){border-top-color:var(--green)}
.helice-card:nth-child(2){border-top-color:var(--teal)}
.helice-card:nth-child(3){border-top-color:var(--amber)}
.helice-icon{font-size:1.75rem;margin-bottom:.75rem;display:block}
.helice-card h3{font-family:var(--serif);font-size:1.1rem;color:var(--navy);margin-bottom:.25rem}
.helice-card .sub{font-size:.75rem;color:var(--gray);font-style:italic;margin-bottom:.85rem}
.helice-card ul{list-style:none;display:flex;flex-direction:column;gap:.45rem}
.helice-card li{font-size:.83rem;color:var(--gray);padding-left:.9rem;position:relative}
.helice-card li::before{content:'✓';position:absolute;left:0;color:var(--green);font-size:.7rem;top:.1em}

/* ── CTA FINAL ── */
.cta-section{
  background:
    radial-gradient(ellipse 60% 80% at 30% 50%, rgba(14,124,123,.25) 0%, transparent 65%),
    var(--navy);
  text-align:center;padding:7rem 2.5rem;
  border-top:1px solid rgba(14,124,123,.2);
}
.cta-section h2{font-size:clamp(2rem,4vw,3rem);margin-bottom:1rem}
.cta-section p{color:var(--gray-lt);font-size:1rem;max-width:500px;margin:0 auto 2.5rem;font-weight:300}
.contact-info{margin-top:2.5rem;font-size:.85rem;color:var(--gray);display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.contact-info a{color:var(--teal-lt);text-decoration:none}
.contact-info a:hover{color:var(--white)}

/* ── FOOTER ── */
footer{
  background:#070f18;padding:1.5rem 2.5rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
  font-size:.8rem;color:var(--gray);
  border-top:1px solid rgba(255,255,255,.05);
}
footer a{color:var(--teal-lt);text-decoration:none}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.reveal.visible{opacity:1;transform:none}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .hero-inner,.brasil-grid{grid-template-columns:1fr}
  .cards-3,.sup-grid,.helice-grid{grid-template-columns:1fr}
  .pilares,.phases{grid-template-columns:1fr 1fr}
  nav{display:none}
}
@media(max-width:600px){
  .pilares,.phases,.kpi-grid{grid-template-columns:1fr}
  header{padding:1rem 1.25rem}
  section{padding:4rem 1.25rem}
  .hero{padding:7rem 1.25rem 4rem}
}
</style>
</head>
<body>
